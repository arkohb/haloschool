<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HaloSchool — Platform Admin</title>
<link rel="stylesheet" href="app.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#171410">
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HaloSchool">
</head>
<body>
<header class="bar">
  <div class="brand">Halo<span>School</span> 🎓</div>
  <span class="who">Platform admin</span>
  <div class="spacer"></div>
  <button class="btn ghost sm" style="color:#fdf6e6;border-color:#4a443a" onclick="logout()">Sign out</button>
</header>

<div class="wrap" id="app" class="hidden">
  <div class="grid cols-3" id="stats"></div>
  <h2 style="margin-top:1.4rem">Schools</h2>
  <div class="tabs">
    <div class="tab on" data-f="all" onclick="setF('all')">All</div>
    <div class="tab" data-f="pending" onclick="setF('pending')">Pending</div>
    <div class="tab" data-f="active" onclick="setF('active')">Active</div>
    <div class="tab" data-f="suspended" onclick="setF('suspended')">Suspended</div>
  </div>
  <div class="card" style="padding:.4rem .6rem">
    <table><thead><tr><th>School</th><th>Contact</th><th>Students</th><th>Teachers</th><th>Status</th><th></th></tr></thead>
    <tbody id="rows"></tbody></table>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script>
const token=localStorage.getItem('school_token');
const H={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
const api=(p,o={})=>fetch(p,{...o,headers:{...H,...(o.headers||{})}}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'error');return d;});
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.add('hidden'),3500);}
function logout(){localStorage.clear();location.href='/';}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=m=>'₵'+(Number(m||0)/100).toLocaleString();
let DATA={schools:[]},F='all';
async function guard(){if(!token){location.href='/';return false;}try{const me=await api('/api/me');if(me.role!=='super'){location.href='/';return false;}return true;}catch{location.href='/';return false;}}
function setF(f){F=f;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.f===f));rows();}
async function load(){
  const d=await api('/api/super/overview');DATA=d;const c=d.counts;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="k">Schools</div><div class="v">${c.schools}</div></div>
    <div class="stat"><div class="k">Pending approval</div><div class="v" style="color:var(--accent)">${c.pending}</div></div>
    <div class="stat"><div class="k">Students</div><div class="v">${c.students}</div></div>
    <div class="stat"><div class="k">Fees collected</div><div class="v" style="color:var(--k-green)">${fmt(c.fees_collected)}</div></div>`;
  rows();
}
function rows(){
  const list=DATA.schools.filter(s=>F==='all'?true:s.status===F);
  document.getElementById('rows').innerHTML=list.length?list.map(s=>`
    <tr><td><strong>${esc(s.name)}</strong><div class="small muted">code ${esc(s.code)} · ${s.created_at}</div></td>
      <td>${esc(s.contact_email||'')}<div class="small muted">${esc(s.contact_phone||'')}</div></td>
      <td>${s.students}</td><td>${s.teachers}</td>
      <td><span class="pill ${s.status==='active'?'active':s.status==='pending'?'pending':'suspended'}">${s.status}</span></td>
      <td class="row" style="gap:.35rem">${actions(s)}</td></tr>`).join(''):'<tr><td colspan="6" class="center muted" style="padding:1.2rem">No schools.</td></tr>';
}
function actions(s){
  if(s.status==='pending')return `<button class="btn green sm" onclick="act(${s.id},'approve')">Approve</button>`;
  if(s.status==='active')return `<button class="btn red sm" onclick="act(${s.id},'suspend')">Suspend</button>`;
  if(s.status==='suspended')return `<button class="btn green sm" onclick="act(${s.id},'activate')">Reinstate</button>`;
  return '';
}
async function act(id,a){try{await api(`/api/super/schools/${id}/${a}`,{method:'POST'});toast('Done');load();}catch(e){toast(e.message);}}
(async()=>{if(await guard()){document.getElementById('app').classList.remove('hidden');load();}})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body>
</html>
