<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HaloSchool — Parent</title>
<link rel="stylesheet" href="app.css">
<script src="https://js.paystack.co/v1/inline.js"></script>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#171410">
  <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HaloSchool">
</head>
<body>
<header class="bar">
  <button class="btn ghost sm hidden" id="backBtn" style="color:#fdf6e6;border-color:#4a443a;margin-right:.4rem" onclick="goBack()">← Back</button>
  <div class="brand">Halo<span>School</span> 🎓</div>
  <span class="who" id="who"></span>
  <div class="spacer"></div>
  <button class="btn ghost sm" style="color:#fdf6e6;border-color:#4a443a" onclick="logout()">Sign out</button>
</header>
<div class="wrap" id="app" class="hidden">
  <div id="notices"></div>
  <div id="kids" class="grid cols-2"></div>
  <div id="detail" style="margin-top:1rem"></div>
</div>
<div id="toast" class="toast hidden"></div>
<script src="/report.js"></script>
<script>
const token=localStorage.getItem('school_token');
const H={'Authorization':'Bearer '+token,'Content-Type':'application/json'};
const api=(p,o={})=>fetch(p,{...o,headers:{...H,...(o.headers||{})}}).then(async r=>{const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'error');return d;});
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.remove('hidden');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.add('hidden'),3800);}
function logout(){localStorage.clear();location.href='/';}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const gradeClass=g=>'grade'+(g||'F');let ME=null,CURSID=null;
async function guard(){if(!token){location.href='/';return false;}try{ME=await api('/api/me');}catch{localStorage.clear();location.href='/';return false;}
  if(ME.role!=='parent'){localStorage.clear();location.href='/';return false;}if(ME.must_change_pw){location.href='/';return false;}
  document.getElementById('who').textContent=ME.name;return true;}
function goBack(){const d=document.getElementById('detail');if(d)d.innerHTML='';const b=document.getElementById('backBtn');if(b)b.classList.add('hidden');CURSID=null;window.scrollTo(0,0);}
async function loadKids(){
  const {children}=await api('/api/parent/children');
  document.getElementById('kids').innerHTML=children.length?children.map(k=>`
    <div class="card" style="cursor:pointer" onclick="openChild(${k.id})"><strong>${esc(k.name)}</strong>
      <div class="small muted">${esc(k.class_name||'')}</div></div>`).join(''):'<p class="muted">No children linked to your account yet.</p>';
  if(children.length)openChild(children[0].id);
}
async function openChild(sid){
  CURSID=sid;const d=await api('/api/parent/child/'+sid);
  const bb=document.getElementById('backBtn');if(bb)bb.classList.remove('hidden');
  const att=d.attendance,tot=att.present+att.absent+att.late;const cur=d.currency==='NGN'?'₦':'₵';
  const results=d.results.map(r=>`<tr><td>${esc(r.course||'')}</td><td>${esc(r.exam||'')}</td><td>${r.score}/${r.max_score}</td><td class="${gradeClass(r.grade)}">${esc(r.grade||'')}</td></tr>`).join('')||'<tr><td colspan="4" class="muted">No marks yet</td></tr>';
  const inv=d.invoices.map(i=>{const bal=i.amount_due_minor-i.amount_paid_minor;
    return `<tr><td>${esc(i.title||'')}</td><td>${cur}${(i.amount_due_minor/100).toLocaleString()}</td>
    <td><span class="pill ${i.status==='paid'?'released':i.status==='partial'?'locked':'due'}">${i.status}</span></td>
    <td>${i.status!=='paid'?`<button class="btn sm" onclick="pay(${i.id})">Pay ${cur}${(bal/100).toLocaleString()}</button>`:'✓'}</td></tr>`;}).join('')||'<tr><td colspan="4" class="muted">No invoices</td></tr>';
  document.getElementById('detail').innerHTML=`
    ${d.student.report_released_at?`<div class="card" style="background:var(--dark);color:#fdf6e6;border:none;display:flex;justify-content:space-between;align-items:center;gap:.6rem;flex-wrap:wrap">
      <div><strong style="color:var(--k-gold)">📄 Term report card ready</strong><div class="small" style="color:#e9ddc4">${esc(d.student.name)}'s report is available to download.</div></div>
      <button class="btn green" onclick="reportCard(${sid})">Download report card</button></div>`:''}
    <div class="card"><div class="row" style="justify-content:space-between"><h2 style="margin:0">${esc(d.student.name)}</h2>
      <button class="btn ghost sm" onclick="reportCard(${sid})">Print report card</button></div>
      <div class="small muted">${esc(d.student.class_name||'')} · ${esc(d.student.admission_no||'')}</div></div>
    <div class="grid cols-3" style="margin-top:.9rem">
      <div class="stat"><div class="k">Present</div><div class="v" style="color:var(--k-green)">${att.present}</div></div>
      <div class="stat"><div class="k">Absent</div><div class="v" style="color:var(--bad)">${att.absent}</div></div>
      <div class="stat"><div class="k">Attendance</div><div class="v">${tot?Math.round(att.present/tot*100):0}%</div></div></div>
    <div class="card" style="margin-top:.9rem;padding:.4rem .6rem"><h3 style="padding:.4rem">Marks</h3>
      <table><thead><tr><th>Course</th><th>Exam</th><th>Score</th><th>Grade</th></tr></thead><tbody>${results}</tbody></table></div>
    <div class="card" style="margin-top:.9rem;padding:.4rem .6rem"><h3 style="padding:.4rem">Assignments</h3>
      <div id="pAssignSec"><p class="muted small" style="padding:.4rem">Loading...</p></div></div>
    <div class="card" style="margin-top:.9rem;padding:.4rem .6rem"><h3 style="padding:.4rem">💬 Messages from teachers</h3>
      <div id="pMsgSec"><p class="muted small" style="padding:.4rem">Loading...</p></div></div>
    <div class="card" style="margin-top:.9rem;padding:.4rem .6rem"><h3 style="padding:.4rem">🚫 Discipline record</h3>
      <div id="pDisciplineSec"><p class="muted small" style="padding:.4rem">Loading...</p></div></div>
    <div class="card" style="margin-top:.9rem;padding:.4rem .6rem"><h3 style="padding:.4rem">💳 Fee ledger</h3>
      <div id="pFeeLedgerSec"><p class="muted small" style="padding:.4rem">Loading...</p></div></div>`;
  loadParentAssignments(sid);
  loadParentMessages();
  loadParentDiscipline(sid);
  loadParentFeeLedger(sid);
}
async function loadParentAssignments(sid){try{
  const {assignments}=await api('/api/parent/child/'+sid+'/assignments');
  const el=document.getElementById('pAssignSec');
  if(!assignments.length){el.innerHTML='<p class="muted small" style="padding:.4rem">No active assignments.</p>';return;}
  el.innerHTML=`<table><thead><tr><th>Assignment</th><th>Due</th><th>Status</th></tr></thead><tbody>${assignments.map(a=>{
    const due=a.due_date?new Date(a.due_date+'T00:00Z').toLocaleDateString():'—';
    const due_class=a.due_date&&new Date(a.due_date)<new Date()?'style="color:var(--bad)"':'';
    const status=a.submitted_at?`<span class="pill released">Submitted ${new Date(a.submitted_at).toLocaleDateString()}</span>`:a.grade!=null?`<span class="pill locked">Graded: ${a.grade}</span>`:'<span class="pill">Pending</span>';
    return `<tr><td><strong>${esc(a.title)}</strong><br><span class="small muted">${esc(a.course)}</span></td><td ${due_class}>${due}</td><td>${status}</td></tr>`;
  }).join('')}</tbody></table>`;
}catch(e){}}
async function loadParentMessages(){try{
  const {conversations}=await api('/api/messages');
  const el=document.getElementById('pMsgSec');
  if(!conversations||!conversations.length){el.innerHTML='<p class="muted small" style="padding:.4rem">No messages from teachers yet.</p>';return;}
  el.innerHTML=`<div style="display:grid;grid-template-columns:1fr auto;gap:.5rem;align-items:center">${conversations.map(c=>`
    <div style="border:1px solid var(--line);border-radius:8px;padding:.6rem;cursor:pointer" onclick="openParentMsg('${esc(c.other_name)}',${c.other_id})">
      <strong>${esc(c.other_name)}</strong> ${c.unread?`<span style="background:#c0392b;color:white;padding:2px 6px;border-radius:12px;font-size:10px">${c.unread}</span>`:''}
      <div class="small muted">${c.messages[c.messages.length-1]?.body?.substring(0,50)||'...'}...</div>
    </div>
  `).join('')}</div>`;
}catch(e){}}
async function openParentMsg(name,other_id){
  const {messages}=await api('/api/messages/'+other_id);
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem';
  wrap.innerHTML=`<div class="card" style="max-width:500px;width:100%;max-height:90vh;overflow:auto">
    <h3 style="margin-top:0">Messages with ${esc(name)}</h3>
    <div style="border:1px solid var(--line);border-radius:8px;padding:1rem;height:300px;overflow-y:auto;background:var(--bg-3);margin-bottom:1rem">
      ${messages.map(m=>`
        <div style="margin-bottom:.8rem;padding:.5rem;background:${m.sender_id===ME.id?'#d99b16':'white'};border-radius:8px;color:${m.sender_id===ME.id?'#171410':'black'}">
          <strong style="font-size:11px;opacity:0.7">${m.sender_id===ME.id?'You':esc(name)}</strong>
          <div style="margin-top:.3rem">${esc(m.body)}</div>
          <span style="font-size:10px;opacity:0.6">${new Date(m.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>
      `).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:.5rem">
      <input id="pMsgBody" placeholder="Type your reply..." style="padding:.5rem;border:1px solid var(--line);border-radius:8px;background:white">
      <button class="btn green" onclick="sendParentMsg(${other_id})">Reply</button>
    </div>
    <button class="btn ghost" onclick="this.parentElement.parentElement.remove()" style="margin-top:1rem;width:100%">Close</button>
  </div>`;
  document.body.appendChild(wrap);
}
async function sendParentMsg(other_id){
  const body=document.getElementById('pMsgBody').value.trim();
  if(!body){toast('Message cannot be empty');return;}
  try{
    await api('/api/messages',{method:'POST',body:JSON.stringify({recipient_id:other_id,body})});
    toast('Message sent');document.querySelector('[style*="position:fixed"]').remove();loadParentMessages();
  }catch(e){toast(e.message);}
}
async function loadParentDiscipline(sid){try{
  const {incidents}=await api('/api/incidents?student_id='+sid);
  const el=document.getElementById('pDisciplineSec');
  if(!incidents||!incidents.length){el.innerHTML='<p class="muted small" style="padding:.4rem">No incidents recorded. ✓</p>';return;}
  el.innerHTML=`<div>${incidents.map(i=>`
    <div style="border:1px solid var(--line);border-radius:8px;padding:.6rem;margin-bottom:.5rem">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div>
          <strong>${esc(i.incident_type)}</strong><br>
          <span class="small">${esc(i.date)}</span>
        </div>
        <span class="pill ${i.severity==='severe'?'due':i.severity==='major'?'locked':'released'}" style="flex-shrink:0">${i.severity}</span>
      </div>
      ${i.description?`<div class="small" style="margin-top:.5rem;color:#666">${esc(i.description)}</div>`:''}
    </div>
  `).join('')}</div>`;
}catch(e){}}
async function loadParentFeeLedger(sid){try{
  const [{invoices,summary},{school}]=await Promise.all([api('/api/fee-ledger?student_id='+sid),api('/api/admin/school')]);
  const el=document.getElementById('pFeeLedgerSec');
  const cur=summary.currency==='NGN'?'₦':'₵';
  el.innerHTML=`<div style="text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--k-gold)">
    ${school.logo?`<img src="${school.logo}" alt="School logo" style="height:60px;margin-bottom:.5rem">`:`<div style="width:60px;height:60px;margin:0 auto .5rem;background:var(--k-gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#171410;font-size:24px">${school.name.charAt(0)}</div>`}
    <h3 style="margin:.3rem 0;color:#171410">${esc(school.name)}</h3>
    ${school.contact_phone?`<div class="small muted">${esc(school.contact_phone)}</div>`:''}
    ${school.address?`<div class="small muted">${esc(school.address)}</div>`:''}
  </div>
  <div style="margin-bottom:1rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem">
    <div style="background:var(--bg-2);padding:.75rem;border-radius:8px;text-align:center">
      <div class="small muted">Total due</div><strong style="color:var(--bad)">${cur}${(summary.total_due/100).toLocaleString()}</strong>
    </div>
    <div style="background:var(--bg-2);padding:.75rem;border-radius:8px;text-align:center">
      <div class="small muted">Paid</div><strong style="color:var(--k-green)">${cur}${(summary.total_paid/100).toLocaleString()}</strong>
    </div>
    <div style="background:var(--bg-2);padding:.75rem;border-radius:8px;text-align:center">
      <div class="small muted">Outstanding</div><strong style="color:${summary.balance>0?'var(--bad)':'var(--k-green)'}">${cur}${(summary.balance/100).toLocaleString()}</strong>
    </div>
  </div>
  ${invoices.length?`<table><thead><tr><th>Invoice</th><th>Amount</th><th>Paid</th><th>Balance</th><th>Due</th><th>Action</th></tr></thead><tbody>
  ${invoices.map(i=>{const bal=i.amount_due_minor-(i.total_payments||0);const overdue=i.due_date&&new Date(i.due_date)<new Date();return `
    <tr ${overdue?'style="background:#ffe6e6"':''}>
      <td style="cursor:pointer" onclick="viewInvoiceDetail(${i.id},${CURSID},'${esc(school.name)}')"><strong style="color:var(--k-gold)">${esc(i.title||'')}</strong><br><span class="small">${esc(i.term||'')}</span></td>
      <td>${cur}${(i.amount_due_minor/100).toLocaleString()}</td>
      <td style="color:var(--k-green)">${cur}${((i.total_payments||0)/100).toLocaleString()}</td>
      <td style="color:${bal>0?'var(--bad)':'var(--k-green)'}">${cur}${(bal/100).toLocaleString()}</td>
      <td class="small">${i.due_date?new Date(i.due_date+'T00:00Z').toLocaleDateString():'—'}</td>
      <td>${bal>0?`<button class="btn sm" onclick="pay(${i.id})">Pay</button>`:'✓'}</td>
    </tr>`;}).join('')}
  </tbody></table>`:'<p class="muted small">No invoices recorded.</p>'}`;
}catch(e){}}
async function viewInvoiceDetail(inv_id,sid,schoolName){
  const d=await api('/api/parent/child/'+sid);
  const {school}=await api('/api/admin/school');
  const inv=d.invoices.find(i=>i.id===inv_id);
  if(!inv){toast('Invoice not found');return;}
  const cur=d.currency==='NGN'?'₦':'₵';
  const bal=inv.amount_due_minor-(inv.amount_paid_minor||0);
  const logoHTML=school.logo?'<img src="'+school.logo+'" alt="School logo" style="height:70px;margin-bottom:10px">':'<div style="width:70px;height:70px;background:#d99b16;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;color:#171410;margin:0 auto 10px">'+school.name.charAt(0)+'</div>';
  const phoneHTML=school.contact_phone?'<div style="font-size:13px;color:#666;margin:5px 0">📞 '+school.contact_phone+'</div>':'';
  const addressHTML=school.address?'<div style="font-size:13px;color:#666;margin:5px 0">📍 '+school.address+'</div>':'';
  const statusColor=inv.status==='paid'?'#1f7a4d':(inv.status==='partial'?'#f39c12':'#c0392b');
  const balColor=bal>0?'#c0392b':'#1f7a4d';
  const payBtn=bal>0?'<button style="background:#d99b16;color:white;padding:12px 24px;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin-top:20px" onclick="window.location.href=\'#\'">Pay Now</button>':'<p style="text-align:center;color:#1f7a4d;font-weight:bold;margin-top:20px">✓ Payment Complete</p>';
  const invoiceHTML='<!DOCTYPE html><html><head><style>body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#f5f5f5}.invoice{background:white;max-width:800px;margin:0 auto;padding:40px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}.header{text-align:center;margin-bottom:30px;border-bottom:3px solid #d99b16;padding-bottom:20px}.invoice-details{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}.detail-box{border:1px solid #e0e0e0;padding:15px;border-radius:8px}.detail-box h4{margin:0 0 10px 0;color:#171410;font-size:12px;text-transform:uppercase}.detail-box p{margin:5px 0;color:#333;font-size:14px}table{width:100%;border-collapse:collapse;margin-bottom:20px}th,td{padding:12px;text-align:left;border-bottom:1px solid #e0e0e0}th{background:#f9f9f9;font-weight:bold;color:#171410;font-size:13px;text-transform:uppercase}.amount{text-align:right;font-weight:bold}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:30px}.summary-item{background:#f9f9f9;padding:15px;border-radius:8px;text-align:center}.summary-label{font-size:12px;color:#666;text-transform:uppercase;margin-bottom:5px}.summary-value{font-size:20px;font-weight:bold}.due{color:#c0392b}.paid{color:#1f7a4d}.footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid #e0e0e0;font-size:12px;color:#999}</style></head><body><div class="invoice"><div class="header"><div style="text-align:center">'+logoHTML+'<h1 style="margin:5px 0;color:#171410;font-size:28px">'+esc(school.name)+'</h1>'+phoneHTML+addressHTML+'</div></div><div class="invoice-details"><div class="detail-box"><h4>Invoice Details</h4><p><strong>Invoice #:</strong> '+inv.id+'</p><p><strong>Title:</strong> '+esc(inv.title)+'</p><p><strong>Term:</strong> '+(inv.term||'—')+'</p><p><strong>Issue Date:</strong> '+new Date(inv.created_at).toLocaleDateString()+'</p></div><div class="detail-box"><h4>Payment Details</h4><p><strong>Student:</strong> '+esc(d.student.name)+'</p><p><strong>Class:</strong> '+(d.student.class_name||'—')+'</p><p><strong>Due Date:</strong> '+(inv.due_date?new Date(inv.due_date+'T00:00Z').toLocaleDateString():'—')+'</p><p><strong>Status:</strong> <span style="background:'+statusColor+';color:white;padding:2px 8px;border-radius:4px;font-size:12px">'+inv.status+'</span></p></div></div><table><thead><tr><th>Description</th><th class="amount">Amount</th></tr></thead><tbody><tr><td>'+esc(inv.title)+'</td><td class="amount">'+cur+''+(inv.amount_due_minor/100).toLocaleString()+'</td></tr></tbody></table><div class="summary"><div class="summary-item"><div class="summary-label">Amount Due</div><div class="summary-value due">'+cur+''+(inv.amount_due_minor/100).toLocaleString()+'</div></div><div class="summary-item"><div class="summary-label">Amount Paid</div><div class="summary-value paid">'+cur+''+((inv.amount_paid_minor||0)/100).toLocaleString()+'</div></div><div class="summary-item"><div class="summary-label">Outstanding</div><div class="summary-value" style="color:'+balColor+'">'+cur+''+(bal/100).toLocaleString()+'</div></div></div>'+payBtn+'<div class="footer">Generated by HaloSchool | '+new Date().toLocaleDateString()+'</div></div><script>window.onload=function(){window.print()};<\/script></body></html>';
  const w=window.open('','_blank');
  w.document.write(invoiceHTML);
  w.document.close();
}
async function pay(invoiceId){
  try{
    const init=await api(`/api/invoices/${invoiceId}/pay-init`,{method:'POST'});
    const pop=PaystackPop.setup({key:init.publicKey,email:init.email||'parent@haloschool.app',amount:init.amount_minor,
      currency:init.currency||'GHS',ref:init.reference,channels:['mobile_money','card'],
      onSuccess:async()=>{try{await api('/api/pay/verify',{method:'POST',body:JSON.stringify({reference:init.reference})});toast('Payment confirmed');openChild(CURSID);}
        catch(e){toast('Paid — confirming shortly');setTimeout(()=>openChild(CURSID),2500);}},
      onCancel:()=>toast('Payment cancelled')});
    pop.openIframe();
  }catch(e){toast(e.message);}
}
async function reportCard(sid){try{const d=await api('/api/report/'+sid);printReportCard(d);}catch(e){toast(e.message);}}
async function loadNotices(){try{const {announcements}=await api('/api/announcements');const el=document.getElementById('notices');if(!el)return;
  if(!announcements.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="card" style="margin-bottom:1rem"><h3 style="margin-top:0">📣 Announcements</h3>${announcements.slice(0,6).map(a=>`<div style="border-bottom:1px solid var(--line);padding:.5rem 0">
    <strong>${esc(a.title)}</strong><div class="small" style="white-space:pre-wrap;margin:.15rem 0">${esc(a.body||'')}</div>
    <div class="small muted">${new Date((a.created_at||'').replace(' ','T')+'Z').toLocaleDateString()}</div></div>`).join('')}</div>`;
}catch(e){}}
(async()=>{if(await guard()){document.getElementById('app').classList.remove('hidden');loadNotices();loadKids();}})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body>
</html>
