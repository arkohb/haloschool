<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaloSchool - Complete Your Enrollment</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body { background: #f7f2e7; }
    .enroll-container { max-width: 450px; margin: 3rem auto; }
    .enroll-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .school-info { background: #f0ebe0; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border-left: 4px solid #d99b16; }
    .info-item { margin-bottom: 1rem; }
    .info-label { font-size: 11px; color: #666; text-transform: uppercase; font-weight: 600; margin-bottom: 0.4rem; }
    .info-value { font-size: 16px; color: #171410; font-weight: 500; }
    .loading { text-align: center; padding: 2rem; color: #666; }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #ddd; border-top-color: #d99b16; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: #ffe6e6; border: 1px solid #ffcccc; color: #c0392b; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
    .success-box { background: #e6f7e6; border: 1px solid #ccf2cc; color: #1f7a4d; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
    input[type="password"] { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 1rem; box-sizing: border-box; }
    input[type="password"]:focus { outline: none; border-color: #d99b16; box-shadow: 0 0 0 3px rgba(217,155,22,0.1); }
    .password-strength { margin-bottom: 1.5rem; }
    .strength-bar { width: 100%; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; margin-bottom: 0.5rem; }
    .strength-fill { height: 100%; width: 0%; transition: width 0.2s, background 0.2s; background: #c0392b; }
    .strength-text { font-size: 12px; color: #666; }
    .btn-enroll { width: 100%; padding: 0.9rem; background: #d99b16; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 16px; transition: background 0.2s; }
    .btn-enroll:hover { background: #c68910; }
    .btn-enroll:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="enroll-container">
    <div class="enroll-card">
      <h1 style="text-align: center; margin: 0 0 2rem 0; font-size: 28px;">Welcome to HaloSchool</h1>
      
      <!-- Loading State -->
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 1rem;">Loading enrollment details...</p>
      </div>
      
      <!-- Enrollment Form -->
      <div id="form" style="display: none;">
        <!-- School Info -->
        <div class="school-info">
          <div class="info-item">
            <div class="info-label">School</div>
            <div class="info-value" id="schoolName">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Your Email</div>
            <div class="info-value" id="userEmail">-</div>
          </div>
          <div class="info-item">
            <div class="info-label">Your Role</div>
            <div class="info-value" id="userRole">-</div>
          </div>
        </div>
        
        <!-- Error Message -->
        <div id="errorBox" class="error-box" style="display: none;"></div>
        
        <!-- Password Form -->
        <div>
          <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: #171410;">Create a Strong Password</label>
          <p style="font-size: 13px; color: #666; margin-bottom: 1rem;">Choose a password at least 8 characters long with uppercase, lowercase, and numbers.</p>
          
          <input 
            type="password" 
            id="password" 
            placeholder="Enter new password"
            onkeyup="checkPasswordStrength()"
          >
          
          <div class="password-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText">Password strength: weak</div>
          </div>
          
          <input 
            type="password" 
            id="password2" 
            placeholder="Confirm password"
            onkeyup="checkPasswordMatch()"
          >
          
          <div id="matchMessage" style="font-size: 13px; color: #666; margin-bottom: 1rem;"></div>
          
          <button class="btn-enroll" onclick="submitEnrollment()" id="submitBtn">
            Set Password & Login
          </button>
        </div>
        
        <p style="font-size: 12px; color: #999; text-align: center; margin-top: 1.5rem;">
          By continuing, you agree to our Terms of Service and Privacy Policy
        </p>
      </div>
    </div>
  </div>

  <script>
    // Get enrollment token from URL
    const pathParts = window.location.pathname.split('/');
    const token = pathParts[pathParts.length - 1];
    
    // Load enrollment data on page load
    window.addEventListener('load', loadEnrollmentData);
    
    async function loadEnrollmentData() {
      try {
        const res = await fetch(`/api/enrollment-data?token=${encodeURIComponent(token)}`);
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || 'Invalid enrollment link');
        }
        
        // Populate form
        document.getElementById('schoolName').textContent = data.school_name;
        document.getElementById('userEmail').textContent = data.email;
        document.getElementById('userRole').textContent = 
          data.role.charAt(0).toUpperCase() + data.role.slice(1);
        
        // Show form, hide loading
        document.getElementById('loading').style.display = 'none';
        document.getElementById('form').style.display = 'block';
      } catch (e) {
        document.getElementById('loading').innerHTML = `<div class="error-box">${e.message}</div>`;
      }
    }
    
    function checkPasswordStrength() {
      const pw = document.getElementById('password').value;
      let strength = 0;
      let text = 'Weak';
      let color = '#c0392b';
      
      if (pw.length >= 8) strength++;
      if (pw.length >= 12) strength++;
      if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) strength++;
      if (/\d/.test(pw)) strength++;
      if (/[^a-zA-Z\d]/.test(pw)) strength++;
      
      if (strength >= 4) { text = 'Strong'; color = '#1f7a4d'; }
      else if (strength >= 3) { text = 'Good'; color = '#d99b16'; }
      else if (strength >= 2) { text = 'Fair'; color = '#e67e22'; }
      
      const bar = document.getElementById('strengthBar');
      bar.style.width = (strength * 20) + '%';
      bar.style.background = color;
      document.getElementById('strengthText').textContent = 'Password strength: ' + text;
    }
    
    function checkPasswordMatch() {
      const pw1 = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;
      const msg = document.getElementById('matchMessage');
      
      if (!pw2) {
        msg.textContent = '';
        return;
      }
      
      if (pw1 === pw2) {
        msg.style.color = '#1f7a4d';
        msg.textContent = '✓ Passwords match';
      } else {
        msg.style.color = '#c0392b';
        msg.textContent = '✗ Passwords do not match';
      }
    }
    
    async function submitEnrollment() {
      const btn = document.getElementById('submitBtn');
      const pw1 = document.getElementById('password').value.trim();
      const pw2 = document.getElementById('password2').value.trim();
      const email = document.getElementById('userEmail').textContent;
      
      // Validation
      if (!pw1) {
        showError('Please enter a password');
        return;
      }
      if (pw1.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }
      if (pw1 !== pw2) {
        showError('Passwords do not match');
        return;
      }
      if (!/[a-z]/.test(pw1) || !/[A-Z]/.test(pw1) || !/\d/.test(pw1)) {
        showError('Password must contain uppercase, lowercase, and numbers');
        return;
      }
      
      // Submit
      btn.disabled = true;
      btn.textContent = 'Setting up your account...';
      
      try {
        const res = await fetch('/api/enroll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            enrollment_token: token,
            email: email,
            new_password: pw1
          })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Enrollment failed');
        
        // Save token
        localStorage.setItem('school_token', data.token);
        localStorage.setItem('school_id', data.school_id);
        
        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = data.redirect || '/' + data.role;
        }, 500);
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Set Password & Login';
        showError(e.message);
      }
    }
    
    function showError(message) {
      const box = document.getElementById('errorBox');
      box.textContent = message;
      box.style.display = 'block';
      window.scrollTo(0, 0);
    }
  </script>
</body>
</html>
